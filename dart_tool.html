<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Ubuntu', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .title {
            color: red;
            font-size: 64px;
            margin-bottom: 20px;
        }
        .container {
            border: 2px solid #fff;
            padding: 20px;
            border-radius: 10px;
            width: 500px;
            text-align: center;
        }
        .button {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            width: 200px;
        }
        .button:hover {
            background-color: #cc0000;
        }
        .output {
            margin-top: 20px;
            background-color: #333;
            padding: 10px;
            border-radius: 5px;
            text-align: left;
            min-height: 100px;
            overflow-y: auto;
            display: none;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 300px;
            border-radius: 5px;
            border: 1px solid #fff;
            background-color: #222;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="title">Dart</div>
    <div class="container">
        <button class="button" onclick="showInput('Phone OSINT', 'Enter phone number (with country code):', 'phone')">Phone OSINT</button>
        <button class="button" onclick="showInput('Background', 'Enter first name and last name:', 'background')">Background</button>
        <button class="button" onclick="showInput('Card Generator', 'How many cards to generate?', 'card')">Card Generator</button>
        <button class="button" onclick="showInput('Amazon Gen', 'How many Amazon store cards?', 'amazon')">Amazon Gen</button>
        <button class="button" onclick="showInput('Discord Ban', 'Enter Discord username to report:', 'discord')">Discord Ban</button>
        <button class="button" onclick="showInput('NMAP', 'Enter IP address to scan:', 'nmap')">NMAP</button>
        <button class="button" onclick="showInput('Roblox Account Ban', 'Enter Roblox username to report:', 'roblox')">Roblox Account Ban</button>
        <div class="output" id="output"></div>
    </div>

    <script>
        let currentMode = '';
        function showInput(title, promptText, mode) {
            currentMode = mode;
            const output = document.getElementById('output');
            output.style.display = 'block';
            output.innerHTML = `<strong>${title}</strong><br>${promptText}<br>`;
            output.innerHTML += `<input type="text" id="userInput" placeholder="Enter here..."><br>`;
            output.innerHTML += `<button onclick="processInput()" style="margin-top: 10px; padding: 5px 10px; background-color: #ff4444; color: white; border: none; cursor: pointer;">Submit</button>`;
        }

        function processInput() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            let result = '';
            switch(currentMode) {
                case 'phone':
                    result = phoneOSINT(input);
                    break;
                case 'background':
                    result = backgroundCheck(input);
                    break;
                case 'card':
                    result = cardGenerator(input);
                    break;
                case 'amazon':
                    result = amazonGenerator(input);
                    break;
                case 'discord':
                    result = discordBan(input);
                    break;
                case 'nmap':
                    result = nmapScan(input);
                    break;
                case 'roblox':
                    result = robloxBan(input);
                    break;
            }
            output.innerHTML += `<br><strong>Result:</strong><br>${result}`;
        }

        function phoneOSINT(phone) {
            return `Phone Number: ${phone}<br>Country: Example Country<br>Carrier: Example Carrier<br>Registered To: John Doe<br>Location: Example City`;
        }

        function backgroundCheck(name) {
            return `Name: ${name}<br>Possible Matches:<br>1. ${name} - Age: 30, Location: City A, Occupation: Developer<br>2. ${name} - Age: 45, Location: City B, Occupation: Teacher`;
        }

        function cardGenerator(count) {
            let result = '';
            const num = parseInt(count) || 1;
            for(let i = 0; i < num; i++) {
                result += `Card ${i+1}:<br>Number: 4532-1234-5678-9012<br>CVV: 123<br>Exp: 12/28<br>ZIP: 12345<br>Linkable to CashApp: Yes<br><br>`;
            }
            return result;
        }

        function amazonGenerator(count) {
            let result = '';
            const num = parseInt(count) || 1;
            for(let i = 0; i < num; i++) {
                result += `Amazon Store Card ${i+1}:<br>Code: AMZ${Math.floor(Math.random() * 1000000)}<br>Balance: $500<br><br>`;
            }
            return result;
        }

        function discordBan(username) {
            return `Targeting: ${username}<br>Action: Reporting with 100 accounts<br>Status: Reports sent. Ban process initiated.`;
        }

        function nmapScan(ip) {
            return `Scanning IP: ${ip}<br>Open Ports: 80, 443, 22<br>Vulnerabilities: HTTP misconfiguration detected<br>Links: http://${ip}, https://${ip}`;
        }

        function robloxBan(username) {
            return `Targeting Roblox User: ${username}<br>Action: Reporting with 100 accounts<br>Status: Reports sent. Ban process initiated.`;
        }
    </script>
</body>
</html>
